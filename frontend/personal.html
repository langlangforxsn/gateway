<!DOCTYPE html>
<html lang="zh-CN" x-data="personalApp()" :class="{ 'dark': dark }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 — 叮当猫的口袋</title>
  <script src="/js/tailwind.js"></script>
  <script defer src="/js/alpine.min.js"></script>
  <script src="/js/echarts.min.js"></script>
  <script src="/js/auth.js"></script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

  <!-- 登录弹窗 -->
  <div x-show="showModal" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center"
       @keydown.escape.window="closeLoginModal()">
    <div class="absolute inset-0 bg-black/50" @click="closeLoginModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100">
      <button @click="closeLoginModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      <div class="bg-gradient-to-r from-indigo-500 to-purple-500 px-8 py-6 text-center">
        <div class="text-4xl mb-2">🐱</div>
        <h2 class="text-white text-xl font-bold">登录叮当猫的口袋</h2>
        <p class="text-white/80 text-sm mt-1">登录后解锁无限使用 + 个人中心</p>
      </div>
      <div class="px-8 py-6">
        <div x-show="error" class="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg" x-text="error"></div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">邮箱地址</label>
          <input type="email" x-model="email" placeholder="your@email.com" :disabled="codeSent"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none disabled:bg-gray-50">
        </div>
        <button x-show="!codeSent" @click="sendEmailCode()" :disabled="sending || !email"
                class="w-full py-2.5 bg-indigo-500 text-white rounded-lg font-medium hover:bg-indigo-600 disabled:opacity-50 mb-4">
          <span x-show="!sending">发送验证码</span>
          <span x-show="sending">发送中...</span>
        </button>
        <div x-show="codeSent" x-transition>
          <div class="mb-1 text-sm text-green-600">验证码已发送至 <span x-text="email" class="font-medium"></span></div>
          <div class="flex gap-2 mb-4">
            <input type="text" x-model="code" placeholder="6 位验证码" maxlength="6" @keyup.enter="verifyEmailCode()"
                   class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-center text-lg tracking-widest">
            <button @click="sendEmailCode()" :disabled="countdown > 0 || sending"
                    class="px-4 py-2.5 text-sm border rounded-lg hover:bg-gray-50 disabled:opacity-50 whitespace-nowrap">
              <span x-show="countdown > 0" x-text="countdown + 's'"></span>
              <span x-show="countdown <= 0">重新发送</span>
            </button>
          </div>
          <button @click="verifyEmailCode()" :disabled="verifying || code.length !== 6"
                  class="w-full py-2.5 bg-indigo-500 text-white rounded-lg font-medium hover:bg-indigo-600 disabled:opacity-50 mb-4">
            <span x-show="!verifying">登  录</span>
            <span x-show="verifying">登录中...</span>
          </button>
        </div>
        <div class="flex items-center gap-3 my-4">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400">或者</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>
        <button @click="alert('Gitee 登录即将上线，敬请期待')"
                class="w-full py-2.5 border rounded-lg text-gray-700 font-medium hover:bg-gray-50 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#c71d23"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.5 14.5h-9v-1h9v1zm0-3h-9v-1h9v1zm0-3h-9v-1h9v1z"/></svg>
          使用 Gitee 账号登录
        </button>
      </div>
    </div>
  </div>

  <!-- 导航栏 -->
  <nav class="fixed top-0 inset-x-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold text-indigo-600"><span class="text-2xl">🐱</span> 叮当猫的口袋</a>
      <div class="flex items-center gap-3">
        <button @click="dark=!dark" class="p-2 rounded-lg hover:bg-gray-100"><span x-show="!dark">🌙</span><span x-show="dark">☀️</span></button>
        <template x-if="!user">
          <button @click="openLoginModal()" class="px-4 py-2 bg-indigo-500 text-white text-sm rounded-lg hover:bg-indigo-600 font-medium">登录</button>
        </template>
        <template x-if="user">
          <div class="relative" x-data="{open:false}">
            <button @click="open=!open" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100">
              <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-sm font-bold" x-text="user.nickname.charAt(0).toUpperCase()"></div>
              <span class="text-sm text-gray-700 hidden sm:inline" x-text="user.nickname"></span>
            </button>
            <div x-show="open" @click.away="open=false" x-cloak class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border py-1 z-50">
              <a href="/personal.html" class="block px-4 py-2 text-sm hover:bg-gray-50">个人中心</a>
              <a x-show="user.is_admin" href="/admin.html" class="block px-4 py-2 text-sm hover:bg-gray-50">管理后台</a>
              <button @click="logout();open=false" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">退出登录</button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="pt-20 pb-16 max-w-4xl mx-auto px-4">

    <!-- 未登录提示 -->
    <div x-show="!user && !loading" x-cloak class="text-center py-20">
      <div class="text-6xl mb-4">🔒</div>
      <h2 class="text-xl font-bold mb-2">请先登录</h2>
      <p class="text-gray-500 mb-6">登录后查看个人中心</p>
      <button @click="openLoginModal()" class="px-6 py-2.5 bg-indigo-500 text-white rounded-lg font-medium hover:bg-indigo-600 transition">
        立即登录
      </button>
    </div>

    <!-- 加载中 -->
    <div x-show="loading" x-cloak class="text-center py-20">
      <div class="animate-spin text-4xl mb-4">⏳</div>
      <p class="text-gray-500">加载中...</p>
    </div>

    <!-- 已登录内容 -->
    <div x-show="user && !loading" x-cloak>

      <!-- 用户信息卡片 -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 mb-6">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 rounded-full bg-indigo-100 dark:bg-indigo-900 flex items-center justify-center text-indigo-600 dark:text-indigo-400 text-2xl font-bold"
               x-text="profile.nickname ? profile.nickname.charAt(0).toUpperCase() : '?'"></div>
          <div class="flex-1">
            <h1 class="text-xl font-bold" x-text="profile.nickname"></h1>
            <div class="flex flex-wrap items-center gap-3 mt-1 text-sm text-gray-500">
              <span class="px-2 py-0.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-full font-mono"
                    x-text="'#' + String(profile.user_no).padStart(5, '0')"></span>
              <span x-text="profile.auth_type === 'email' ? '📧 邮箱登录' : '🔶 Gitee 登录'"></span>
              <span x-text="'注册于 ' + profile.created_at"></span>
            </div>
          </div>
          <div class="text-right">
            <div class="text-3xl font-bold text-indigo-600" x-text="profile.usage_count"></div>
            <div class="text-xs text-gray-400">总使用次数</div>
          </div>
        </div>
      </div>

      <!-- 统计图表 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- 饼图：各工具使用占比 -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
          <h2 class="text-lg font-bold mb-4">📊 使用占比</h2>
          <div id="chart-pie" class="w-full" style="height: 280px;"></div>
          <div x-show="stats.tool_stats.length === 0" class="text-center text-gray-400 py-12">
            暂无使用记录
          </div>
        </div>

        <!-- 柱状图：近 7 天趋势 -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
          <h2 class="text-lg font-bold mb-4">📈 近 7 天使用趋势</h2>
          <div id="chart-bar" class="w-full" style="height: 280px;"></div>
          <div x-show="stats.daily_stats.length === 0" class="text-center text-gray-400 py-12">
            暂无使用记录
          </div>
        </div>
      </div>

      <!-- 最近使用记录 -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
        <h2 class="text-lg font-bold mb-4">📋 最近使用</h2>

        <div x-show="usageRecords.length === 0" class="text-center text-gray-400 py-8">
          暂无使用记录
        </div>

        <div x-show="usageRecords.length > 0" class="divide-y divide-gray-100 dark:divide-gray-700">
          <template x-for="record in usageRecords" :key="record.id">
            <div class="py-3 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <span class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-sm"
                      x-text="getToolEmoji(record.tool_name)"></span>
                <div>
                  <div class="text-sm font-medium" x-text="getToolLabel(record.tool_name)"></div>
                  <div class="text-xs text-gray-400" x-text="record.action"></div>
                </div>
              </div>
              <div class="text-xs text-gray-400" x-text="record.created_at"></div>
            </div>
          </template>
        </div>

        <!-- 分页 -->
        <div x-show="usagePages > 1" class="flex justify-center gap-2 mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
          <button @click="loadUsage(usagePage - 1)" :disabled="usagePage <= 1"
                  class="px-3 py-1 text-sm rounded border hover:bg-gray-50 disabled:opacity-40">上一页</button>
          <span class="px-3 py-1 text-sm text-gray-500" x-text="usagePage + ' / ' + usagePages"></span>
          <button @click="loadUsage(usagePage + 1)" :disabled="usagePage >= usagePages"
                  class="px-3 py-1 text-sm rounded border hover:bg-gray-50 disabled:opacity-40">下一页</button>
        </div>
      </div>

      <!-- 退出登录 -->
      <div class="text-center mt-8">
        <button @click="logout(); window.location.href='/'"
                class="px-6 py-2 text-sm text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition">
          退出登录
        </button>
      </div>

    </div>
  </main>

  <script>
    // 工具名 → 显示名 + emoji
    const TOOL_META = {
      "pdf_merge":        { label: "PDF 合并",     emoji: "📄" },
      "pdf_split":        { label: "PDF 分割",     emoji: "✂️" },
      "pdf_compress":     { label: "PDF 压缩",     emoji: "📦" },
      "pdf_encrypt":      { label: "PDF 加密",     emoji: "🔐" },
      "pdf_rotate":       { label: "PDF 旋转",     emoji: "🔄" },
      "pdf_delete_pages": { label: "PDF 删除页",   emoji: "🗑️" },
      "pdf_page_numbers": { label: "PDF 加页码",   emoji: "🔢" },
      "pdf_to_image":     { label: "PDF 转图片",   emoji: "🖼️" },
      "image_to_pdf":     { label: "图片转 PDF",   emoji: "📸" },
      "pdf_to_word":      { label: "PDF 转 Word",  emoji: "📝" },
      "office_to_pdf":    { label: "Office 转 PDF", emoji: "📎" },
    };

    function getToolLabel(name) { return TOOL_META[name]?.label || name; }
    function getToolEmoji(name) { return TOOL_META[name]?.emoji || "🔧"; }

    function personalApp() {
      return {
        dark: localStorage.getItem("dark") === "true",
        loading: true,
        profile: {},
        stats: { tool_stats: [], daily_stats: [], total: 0 },
        usageRecords: [],
        usagePage: 1,
        usagePages: 1,
        // 登录状态
        user: null,
        showModal: false,
        email: '',
        code: '',
        codeSent: false,
        countdown: 0,
        sending: false,
        verifying: false,
        error: '',
        countdownTimer: null,

        async init() {
          this.$watch("dark", v => localStorage.setItem("dark", v));
          try {
            const res = await fetch('/api/auth/status', {credentials: 'same-origin'});
            const data = await res.json();
            if (data.logged_in) this.user = data.user;
          } catch {}
          if (!this.user) { this.loading = false; return; }
          await this.loadAll();
          this.loading = false;
          // 图表容器在 x-show="user && !loading" 中，必须等 loading=false 且 DOM 渲染后才能画图
          await this.$nextTick();
          this.renderCharts();
        },

        openLoginModal() { this.error=''; this.email=''; this.code=''; this.codeSent=false; this.countdown=0; this.showModal=true; },
        closeLoginModal() { this.showModal=false; },
        async sendEmailCode() {
          this.error=''; if(!this.email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.email)){this.error='请输入正确的邮箱地址';return;}
          this.sending=true;
          try{const res=await fetch('/api/auth/email/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:this.email})});const data=await res.json();if(!res.ok)throw new Error(data.error);this.codeSent=true;this.countdown=60;this.countdownTimer=setInterval(()=>{this.countdown--;if(this.countdown<=0)clearInterval(this.countdownTimer);},1000);}catch(e){this.error=e.message;}finally{this.sending=false;}
        },
        async verifyEmailCode() {
          this.error=''; if(!this.code||this.code.length!==6){this.error='请输入 6 位验证码';return;}
          this.verifying=true;
          try{const res=await fetch('/api/auth/email/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:this.email,code:this.code})});const data=await res.json();if(!res.ok)throw new Error(data.error);this.user=data.user;this.showModal=false;await this.loadAll();}catch(e){this.error=e.message;}finally{this.verifying=false;}
        },
        async logout() { try{await fetch('/api/auth/logout',{method:'POST'});}catch{} this.user=null; },
        formatUserNo(no) { return '#'+String(no).padStart(5,'0'); },

        async loadAll() {
          await Promise.all([
            this.loadProfile(),
            this.loadStats(),
            this.loadUsage(1),
          ]);
        },

        async loadProfile() {
          try {
            const res = await fetch("/api/user/profile", {credentials:"same-origin"});
            if (res.ok) this.profile = await res.json();
          } catch {}
        },

        async loadStats() {
          try {
            const res = await fetch("/api/user/stats?days=7", {credentials:"same-origin"});
            if (res.ok) {
              this.stats = await res.json();
            }
          } catch {}
        },

        async loadUsage(page) {
          try {
            const res = await fetch(`/api/user/usage?page=${page}&per_page=15`, {credentials:"same-origin"});
            if (res.ok) {
              const data = await res.json();
              this.usageRecords = data.records;
              this.usagePage = data.page;
              this.usagePages = data.pages;
            }
          } catch {}
        },

        renderCharts() {
          this.renderPieChart();
          this.renderBarChart();
        },

        renderPieChart() {
          const el = document.getElementById("chart-pie");
          if (!el || this.stats.tool_stats.length === 0) return;
          if (echarts.getInstanceByDom(el)) echarts.getInstanceByDom(el).dispose();
          const chart = echarts.init(el);
          chart.setOption({
            tooltip: { trigger: "item", formatter: "{b}: {c} 次 ({d}%)" },
            color: ["#6366f1", "#8b5cf6", "#a78bfa", "#c4b5fd", "#818cf8", "#6d28d9", "#4f46e5", "#7c3aed", "#5b21b6", "#4338ca", "#3730a3"],
            series: [{
              type: "pie",
              radius: ["40%", "70%"],
              center: ["50%", "55%"],
              avoidLabelOverlap: true,
              itemStyle: { borderRadius: 8, borderColor: "#fff", borderWidth: 2 },
              label: { show: true, fontSize: 12 },
              data: this.stats.tool_stats,
            }],
          });
          window.addEventListener("resize", () => chart.resize());
        },

        renderBarChart() {
          const el = document.getElementById("chart-bar");
          if (!el || this.stats.daily_stats.length === 0) return;
          if (echarts.getInstanceByDom(el)) echarts.getInstanceByDom(el).dispose();
          const chart = echarts.init(el);
          const dates = this.stats.daily_stats.map(d => d.date);
          const counts = this.stats.daily_stats.map(d => d.count);

          chart.setOption({
            tooltip: { trigger: "axis" },
            grid: { left: "10%", right: "5%", top: "10%", bottom: "15%" },
            xAxis: { type: "category", data: dates, axisLabel: { fontSize: 11 } },
            yAxis: { type: "value", minInterval: 1, axisLabel: { fontSize: 11 } },
            series: [{
              type: "bar",
              data: counts,
              barWidth: "50%",
              itemStyle: {
                borderRadius: [6, 6, 0, 0],
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: "#6366f1" },
                  { offset: 1, color: "#a78bfa" },
                ]),
              },
            }],
          });
          window.addEventListener("resize", () => chart.resize());
        },
      };
    }
  </script>

</body>
</html>
